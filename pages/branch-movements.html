<!DOCTYPE html>
<html lang="es" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movimientos de Sucursal - Sistema de Facturación</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../assets/css/devextreme-theme.css?v=1783555268534">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="d-flex w-100 justify-content-between align-items-center pe-3">
                <a href="#" class="sidebar-brand mb-0">
                    <i class="bi bi-hexagon-fill"></i> <span id="brand-name">Nexus POS</span>
                </a>
                <button class="btn p-1 text-danger border-0" onclick="logout()" title="Cerrar Sesi�n">
                    <i class="bi bi-power fs-4"></i>
                </button>
            </div>
            </div>
            <nav class="sidebar-nav"></nav>
            
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar">
                <div class="d-flex align-items-center gap-3">
                    <button class="btn btn-light d-lg-none" id="sidebarToggle"><i class="bi bi-list"></i></button>
                </div>
                <div class="d-flex align-items-center gap-4">
                    
                    <div class="dropdown me-3">
                          <button class="btn border-0 bg-transparent text-body p-2" type="button" data-bs-toggle="dropdown" onclick="loadNotifications()">
                              <div class="position-relative d-inline-block">
                                  <i class="bi bi-bell fs-5"></i>
                                  <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" id="notif-badge" style="display:none; font-size: 0.6em; transform: translate(-30%, -30%) !important;"></span>
                              </div>
                          </button>
                          <ul class="dropdown-menu dropdown-menu-end shadow-sm" style="width: 300px; max-height: 400px; overflow-y: auto;" id="notif-list">
                              <li><h6 class="dropdown-header">Notificaciones Pendientes</h6></li>
                              <!-- Loaded via JS -->
                          </ul>
                      </div>
                      <div class="form-check form-switch m-0">
                        <input class="form-check-input" type="checkbox" role="switch" id="theme-toggle">
                        <label class="form-check-label" for="theme-toggle"><i class="bi bi-moon-stars"></i></label>
                    </div>
                </div>
            </header>

            <div class="page-content">
                <h2 class="mb-4 fw-bold text-dark">Movimientos Financieros de Sucursal</h2>
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="d-flex align-items-center gap-3">
                        <h4 class="fw-bold mb-0 text-secondary">Registro de Entradas y Salidas</h4>
                        <select class="form-select form-select-sm" id="branchFilter" onchange="loadMovements(1)" style="width: auto;">
                            <option value="">Seleccione una sucursal...</option>
                        </select>
                    </div>
                    <button class="btn btn-primary shadow-sm" data-bs-toggle="modal" data-bs-target="#movementModal" onclick="clearForm()">
                        <i class="bi bi-plus-lg me-1"></i> Registrar Movimiento
                    </button>
                </div>

                <div class="row mb-3">
                    <div class="col-md-4">
                        <input type="text" id="searchInput" class="form-control" placeholder="Buscar por categoría o descripción..." onkeyup="handleSearch(event)">
                    </div>
                </div>

                <div class="card border-0">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th class="ps-4">ID</th>
                                        <th>Fecha</th>
                                        <th>Categoría</th>
                                        <th>Tipo</th>
                                        <th>Monto ($)</th>
                                        <th>Descripción</th>
                                        <th>Usuario</th>
                                    </tr>
                                </thead>
                                <tbody id="movements-table-body">
                                    <!-- Dinámico -->
                                </tbody>
                            </table>
                        </div>
                        <div id="pagination-container" class="p-3 border-top"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Movement Modal -->
    <div class="modal fade" id="movementModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content border-0 shadow">
                <div class="modal-header border-bottom-0 pb-0">
                    <h5 class="modal-title fw-bold" id="movementModalLabel">Registrar Movimiento</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="movementForm">
                        <div class="mb-3">
                            <label class="form-label text-secondary small fw-semibold">Tipo *</label>
                            <select class="form-select" id="movType" required onchange="updateCategories()">
                                <option value="IN">Ingreso (Inyección, etc.)</option>
                                <option value="OUT">Egreso (Pago, Gastos, Planilla)</option>
                            </select>
                        </div>
                          <div class="mb-3">
                              <label class="form-label text-secondary small fw-semibold">Categoría *</label>
                              <select class="form-select" id="movCategory" required onchange="toggleEmployeeField()">
                                  <!-- Dinámico -->
                              </select>
                          </div>
                          <div class="mb-3">
                              <label class="form-label text-secondary small fw-semibold">Cuenta Contable (Opcional)</label>
                              <select class="form-select" id="movAccountId">
                                  <option value="">-- No Registrar en Contabilidad --</option>
                              </select>
                          </div>
                          <div class="mb-3">
                              <label class="form-label text-secondary small fw-semibold">Método de Pago</label>
                              <select class="form-select" id="movPaymentMethod" required>
                                  <option value="Cash">Efectivo (Caja)</option>
                                  <option value="Bank">Transferencia/Cheque (Banco)</option>
                              </select>
                          </div>
                          <div class="mb-3" id="employeeDiv" style="display:none;">
                            <label class="form-label text-secondary small fw-semibold">Empleado a Pagar *</label>
                            <select class="form-select" id="movEmployee" onchange="updateEmployeeSalary()">
                                <option value="">Seleccione un empleado...</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-secondary small fw-semibold">Monto ($) *</label>
                            <input type="number" step="0.01" class="form-control" id="movAmount" required min="0.01">
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-secondary small fw-semibold">Descripción</label>
                            <textarea class="form-control" id="movDescription" rows="3" placeholder="Detalle del movimiento"></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-top-0 pt-0">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" id="btnSaveMovement" onclick="saveMovement()">Guardar Movimiento</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
    <script src="../assets/js/theme.js?v=20260627004119"></script>
    <script src="../assets/js/toast.js?v=20260627004119"></script>
    <script src="../assets/js/apiClient.js?v=20260627004119"></script>
    <script src="../assets/js/signalr-client.js?v=20260627004119"></script>
    <script src="../assets/js/pagination.js?v=20260627004119"></script>
    <script src="branch-movements.js"></script>
    <script src="../assets/js/ui-core.js?v=20260627004119"></script>
    <script src="../assets/js/menu.js?v=1783831414144"></script>
</body>
</html>
