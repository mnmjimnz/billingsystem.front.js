<!DOCTYPE html>
<html lang="es" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Facturación Premium</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background: linear-gradient(135deg, var(--brand-primary) 0%, var(--brand-info) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
        }
        .login-card {
            background-color: var(--bg-card);
            border: none;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            width: 100%;
            max-width: 420px;
            padding: 2.5rem;
            position: relative;
            overflow: hidden;
        }
        .login-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 6px;
            background: linear-gradient(90deg, var(--brand-primary), var(--brand-info));
        }
        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .login-icon {
            font-size: 3rem;
            color: var(--brand-primary);
            margin-bottom: 1rem;
        }
        .form-floating > label {
            color: var(--text-secondary);
        }
    </style>
    <link rel="stylesheet" href="../assets/css/devextreme-theme.css?v=20260627004119">
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <i class="bi bi-box-seam login-icon"></i>
            <h3 class="fw-bold mb-1">Bienvenido</h3>
            <p class="text-secondary mb-0">Ingresa tus credenciales para continuar</p>
        </div>
        
        <form id="loginForm">
            <div id="error-alert" class="alert alert-danger d-none py-2" style="font-size: 0.9rem;"></div>
            
            <div class="form-floating mb-3">
                <input type="text" class="form-control" id="username" placeholder="Usuario" required>
                <label for="username"><i class="bi bi-person me-2"></i>Usuario</label>
            </div>
            
            <div class="form-floating mb-4">
                <input type="password" class="form-control" id="password" placeholder="Contraseña" required>
                <label for="password"><i class="bi bi-lock me-2"></i>Contraseña</label>
            </div>
            
            <button type="submit" class="btn btn-primary w-100 py-2 fs-5 fw-bold shadow-sm">
                Ingresar al Sistema
            </button>
        </form>
    </div>

    <script src="../assets/js/apiClient.js?v=20260627004119"></script>
    <script src="login.js?v=20260627004119"></script>
    <script src="../assets/js/ui-core.js?v=20260627004119"></script>
</body>
</html>
