<!DOCTYPE html>
<html lang="es" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roles y Permisos - Sistema de Facturación Premium</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
        <link rel="stylesheet" href="../assets/css/devextreme-theme.css?v=20260627004119">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="d-flex w-100 justify-content-between align-items-center pe-3">
                <a href="#" class="sidebar-brand mb-0">
                    <i class="bi bi-hexagon-fill"></i> <span id="brand-name">Nexus POS</span>
                </a>
                <button class="btn p-1 text-danger border-0" onclick="logout()" title="Cerrar Sesi�n">
                    <i class="bi bi-power fs-4"></i>
                </button>
            </div>
            </div>
            <nav class="sidebar-nav"></nav>
            
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar">
                <div class="d-flex align-items-center gap-3">
                    <button class="btn btn-light d-lg-none" id="sidebarToggle"><i class="bi bi-list"></i></button>
                </div>
                <div class="d-flex align-items-center gap-4">
                    <div class="dropdown">
                        <button class="btn border-0 bg-transparent text-body p-2" type="button" data-bs-toggle="dropdown" onclick="loadNotifications()">
                            <div class="position-relative d-inline-block">
                                <i class="bi bi-bell fs-5"></i>
                                <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" id="notif-badge" style="display:none; font-size: 0.6em; transform: translate(-30%, -30%) !important;"></span>
                            </div>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end shadow-sm" style="width: 300px; max-height: 400px; overflow-y: auto;" id="notif-list">
                            <li><h6 class="dropdown-header">Notificaciones Pendientes</h6></li>
                        </ul>
                    </div>
                    <div class="form-check form-switch m-0">
                        <input class="form-check-input" type="checkbox" role="switch" id="theme-toggle">
                        <label class="form-check-label" for="theme-toggle"><i class="bi bi-moon-stars"></i></label>
                    </div>
                </div>
            </header>

            <div class="page-content">
                <h2 class="mb-4 fw-bold text-dark">Roles y Permisos</h2>
                <div class="row">
                    <div class="col-md-4">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h5 class="fw-bold mb-0 text-secondary">Lista de Roles</h5>
                            <button class="btn btn-sm btn-primary shadow-sm" onclick="openRoleModal()">
                                <i class="bi bi-plus-lg"></i> Nuevo Rol
                            </button>
                        </div>
                        <div class="list-group border-0 shadow-sm rounded-3" id="roles-list">
                            <!-- Dinámico -->
                        </div>
                    </div>
                    <div class="col-md-8">
                        <div class="card border-0 shadow-sm" id="permissions-card" style="display: none;">
                            <div class="card-header bg-transparent border-bottom pt-4 pb-3">
                                <div class="d-flex justify-content-between align-items-center">
                                    <h5 class="fw-bold mb-0 text-primary" id="selected-role-name">Seleccione un rol</h5>
                                    <button class="btn btn-primary btn-sm" id="btn-save-permissions" onclick="savePermissions()">Guardar Permisos</button>
                                </div>
                            </div>
                            <div class="card-body p-4">
                                <div id="permissions-grid" class="row g-4">
                                    <!-- Dinámico -->
                                </div>
                            </div>
                        </div>
                        <div class="text-center p-5 text-muted" id="no-role-selected">
                            <i class="bi bi-shield-check display-1 mb-3 text-secondary opacity-50"></i>
                            <h4>Gestión de Permisos</h4>
                            <p>Selecciona un rol de la lista izquierda para administrar sus permisos de acceso.</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Role Modal -->
    <div class="modal fade" id="roleModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content border-0 shadow">
                <div class="modal-header border-bottom-0 pb-0">
                    <h5 class="modal-title fw-bold" id="roleModalLabel">Nuevo Rol</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="roleForm">
                        <input type="hidden" id="roleId">
                        <div class="mb-3">
                            <label class="form-label text-secondary small fw-semibold">Nombre del Rol *</label>
                            <input type="text" class="form-control" id="roleName" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-secondary small fw-semibold">Descripción</label>
                            <textarea class="form-control" id="roleDescription" rows="3"></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-top-0 pt-0">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" id="btnSaveRole" onclick="saveRole()">Guardar Rol</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
    <script src="../assets/js/theme.js?v=20260627004119"></script>
    <script src="../assets/js/toast.js?v=20260627004119"></script>
    <script src="../assets/js/apiClient.js?v=20260627004119"></script>
    <script src="../assets/js/signalr-client.js?v=20260627004119"></script>
    <script src="roles.js?v=20260627004119"></script>
    <script src="../assets/js/ui-core.js?v=20260627004119"></script>
    <script src="../assets/js/menu.js"></script>
</body>
</html>
