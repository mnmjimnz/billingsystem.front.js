<!DOCTYPE html>
<html lang="es" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notificaciones - Nexus POS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../assets/css/devextreme-theme.css">
</head>
<body class="bg-light">

    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <a href="#" class="sidebar-brand mb-0">
                    <i class="bi bi-hexagon-fill"></i> <span id="brand-name">Nexus POS</span>
                </a>
                <button class="btn p-1 text-danger border-0" onclick="logout()" title="Cerrar Sesión">
                    <i class="bi bi-power fs-4"></i>
                </button>
            </div>
            
            <nav class="sidebar-nav"></nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="app-header">
                <div class="d-flex align-items-center gap-3">
                    <button class="btn btn-light d-lg-none" id="sidebarToggle"><i class="bi bi-list"></i></button>
                    <h2 class="mb-0 fs-4 fw-bold text-dark d-none d-md-block">Historial de Notificaciones</h2>
                </div>
                <div class="d-flex align-items-center gap-4">
                    <button class="btn border-0 bg-transparent text-body p-2 theme-toggle" title="Cambiar Tema">
                        <i class="bi bi-moon-stars fs-5"></i>
                    </button>
                </div>
            </header>

            <div class="page-content p-4">
                
                <div class="card shadow-sm border-0 rounded-3">
                    <div class="card-body bg-white rounded-3 p-4">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th scope="col" class="border-0 rounded-start">Fecha</th>
                                        <th scope="col" class="border-0">Tipo</th>
                                        <th scope="col" class="border-0">Título</th>
                                        <th scope="col" class="border-0">Mensaje</th>
                                        <th scope="col" class="border-0 rounded-end text-center">Estado</th>
                                    </tr>
                                </thead>
                                <tbody id="notifications-table-body">
                                    <!-- Dynamic rows will be inserted here -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/apiClient.js"></script>
    <script src="../assets/js/ui-core.js"></script>
    <script src="../assets/js/menu.js"></script>
    <script src="notifications.js"></script>
</body>
</html>
