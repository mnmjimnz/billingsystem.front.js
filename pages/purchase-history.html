<!DOCTYPE html>
<html lang="es" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial de Compras - Sistema de Facturación Premium</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
        <link rel="stylesheet" href="../assets/css/devextreme-theme.css?v=20260627004119">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="d-flex w-100 justify-content-between align-items-center pe-3">
                <a href="#" class="sidebar-brand mb-0">
                    <i class="bi bi-hexagon-fill"></i> <span id="brand-name">Nexus POS</span>
                </a>
                <button class="btn p-1 text-danger border-0" onclick="logout()" title="Cerrar Sesi�n">
                    <i class="bi bi-power fs-4"></i>
                </button>
            </div>
            </div>
            <nav class="sidebar-nav"></nav>
            
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar">
                <div class="d-flex align-items-center gap-3">
                    <button class="btn btn-light d-lg-none" id="sidebarToggle"><i class="bi bi-list"></i></button>
                </div>
                <div class="d-flex align-items-center gap-4">
                    <div class="dropdown me-3">
                          <button class="btn border-0 bg-transparent text-body p-2" type="button" data-bs-toggle="dropdown" onclick="loadNotifications()">
                              <div class="position-relative d-inline-block">
                                  <i class="bi bi-bell fs-5"></i>
                                  <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" id="notif-badge" style="display:none; font-size: 0.6em; transform: translate(-30%, -30%) !important;"></span>
                              </div>
                          </button>
                          <ul class="dropdown-menu dropdown-menu-end shadow-sm" style="width: 300px; max-height: 400px; overflow-y: auto;" id="notif-list">
                              <li><h6 class="dropdown-header">Notificaciones Pendientes</h6></li>
                              <!-- Loaded via JS -->
                          </ul>
                      </div>
                      <div class="form-check form-switch m-0">
                        <input class="form-check-input" type="checkbox" role="switch" id="theme-toggle">
                        <label class="form-check-label" for="theme-toggle"><i class="bi bi-moon-stars"></i></label>
                    </div>
                </div>
            </header>

            <div class="page-content">
                <h2 class="mb-4 fw-bold text-dark">Historial de Compras</h2>
                <div class="row mb-3">
                    <div class="col-md-4">
                        <input type="text" id="searchInput" class="form-control" placeholder="Buscar compras (factura, proveedor)..." onkeyup="handleSearch(event)">
                    </div>
                </div>

                <div class="card border-0 shadow-sm">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th class="ps-4">ID</th>
                                        <th>Factura</th>
                                        <th>Proveedor</th>
                                        <th>Fecha</th>
                                        <th>Tipo Pago</th>
                                        <th>Total</th>
                                          <th class="text-center">Acciones</th>
                                    </tr>
                                </thead>
                                <tbody id="purchases-table-body">
                                    <!-- Dinámico -->
                                </tbody>
                            </table>
                        </div>
                        <div id="pagination-container" class="p-3 border-top"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    
    <!-- Purchase Details Modal -->
    <div class="modal fade" id="purchaseDetailsModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
            <div class="modal-content border-0 shadow">
                <div class="modal-header border-bottom-0 pb-0">
                    <h5 class="modal-title fw-bold">Detalles de la Compra</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="row mb-4">
                        <div class="col-md-4">
                            <p class="text-secondary small mb-1">No. Factura / Doc.</p>
                            <h6 class="fw-bold" id="detailInvoice">-</h6>
                        </div>
                        <div class="col-md-4">
                            <p class="text-secondary small mb-1">Fecha</p>
                            <h6 class="fw-bold" id="detailDate">-</h6>
                        </div>
                        <div class="col-md-4">
                            <p class="text-secondary small mb-1">Proveedor</p>
                            <h6 class="fw-bold" id="detailSupplier">-</h6>
                        </div>
                        <div class="col-md-6 mt-3">
                            <p class="text-secondary small mb-1">Estado / Tipo de Pago</p>
                            <h6 class="fw-bold" id="detailStatus">-</h6>
                        </div>
                        <div class="col-md-6 mt-3">
                            <p class="text-secondary small mb-1">Total</p>
                            <h6 class="fw-bold text-success fs-5" id="detailTotal">-</h6>
                        </div>
                    </div>
                    
                    <h6 class="fw-bold mb-3"><i class="bi bi-box-seam me-2"></i>Productos Adquiridos</h6>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>C&oacute;digo</th>
                                    <th>Producto</th>
                                    <th class="text-center">Cant.</th>
                                    <th class="text-end">Costo Unit.</th>
                                    <th class="text-end">Subtotal</th>
                                </tr>
                            </thead>
                            <tbody id="detailProductsBody">
                                <!-- Rendered by JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
                <div class="modal-footer border-top-0 pt-0">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cerrar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Libraries -->
    <script src="../assets/js/theme.js?v=20260627004119"></script>
    <script src="../assets/js/toast.js?v=20260627004119"></script>
    <script src="../assets/js/apiClient.js?v=20260627004119"></script>
    <script src="../assets/js/pagination.js?v=20260627004119"></script>
    <script src="purchase-history.js?v=20260627004119"></script>
    <script src="../assets/js/ui-core.js?v=20260627004119"></script>
    <script src="../assets/js/menu.js"></script>
</body>
</html>
