<!DOCTYPE html>
<html lang="es" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuarios - Sistema de Facturación Premium</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
        <link rel="stylesheet" href="../assets/css/devextreme-theme.css?v=1783555268580">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="d-flex w-100 justify-content-between align-items-center pe-3">
                <a href="#" class="sidebar-brand mb-0">
                    <i class="bi bi-hexagon-fill"></i> <span id="brand-name">Nexus POS</span>
                </a>
                <button class="btn p-1 text-danger border-0" onclick="logout()" title="Cerrar Sesi�n">
                    <i class="bi bi-power fs-4"></i>
                </button>
            </div>
            </div>
            <nav class="sidebar-nav"></nav>
            
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar">
                <div class="d-flex align-items-center gap-3">
                    <button class="btn btn-light d-lg-none" id="sidebarToggle"><i class="bi bi-list"></i></button>
                </div>
                <div class="d-flex align-items-center gap-4">
                                        
                    <div class="dropdown me-3">
                          <button class="btn border-0 bg-transparent text-body p-2" type="button" data-bs-toggle="dropdown" onclick="loadNotifications()">
                              <div class="position-relative d-inline-block">
                                  <i class="bi bi-bell fs-5"></i>
                                  <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" id="notif-badge" style="display:none; font-size: 0.6em; transform: translate(-30%, -30%) !important;"></span>
                              </div>
                          </button>
                          <ul class="dropdown-menu dropdown-menu-end shadow-sm" style="width: 300px; max-height: 400px; overflow-y: auto;" id="notif-list">
                              <li><h6 class="dropdown-header">Notificaciones Pendientes</h6></li>
                              <!-- Loaded via JS -->
                          </ul>
                      </div>
                      <div class="form-check form-switch m-0">
                        <input class="form-check-input" type="checkbox" role="switch" id="theme-toggle">
                        <label class="form-check-label" for="theme-toggle"><i class="bi bi-moon-stars"></i></label>
                    </div>
                </div>
            </header>

            <div class="page-content">
                <h2 class="mb-4 fw-bold text-dark">Recursos Humanos y Nómina</h2>
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h4 class="fw-bold mb-0 text-secondary">Expedientes y Planillas</h4>
                    <button class="btn btn-primary shadow-sm" onclick="calculatePayroll()">
                        <i class="bi bi-person-plus me-1"></i> Calcular Nómina
                    </button>
                </div>

                
                <ul class="nav nav-tabs mb-4" id="hrTabs" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" id="expedientes-tab" data-bs-toggle="tab" data-bs-target="#expedientes" type="button" role="tab">Expedientes</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="asistencia-tab" data-bs-toggle="tab" data-bs-target="#asistencia" type="button" role="tab">Asistencia (Reloj)</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="nomina-tab" data-bs-toggle="tab" data-bs-target="#nomina" type="button" role="tab">Nóminas (Planillas)</button>
                    </li>
                </ul>
                <div class="tab-content" id="hrTabsContent">
                    <div class="tab-pane fade show active" id="expedientes" role="tabpanel">
<div class="row mb-3">
                    <div class="col-md-4">
                        <input type="text" id="searchInput" class="form-control" placeholder="Buscar usuarios..." onkeyup="handleSearch(event)">
                    </div>
                </div>

                <div class="card border-0">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="table-light">
                                    <tr>
                                        
                                        <th class="ps-4">DPI/Doc</th>
                                        <th>Empleado</th>
                                        <th>Cargo</th>
                                        <th>Salario Base</th>
                                        <th>Fecha Alta</th>
                                        <th class="text-end pe-4">Acciones</th>
                                    </tr>
                                </thead>
                                <tbody id="hr-table-body">
                                    <!-- Dinámico -->
                                </tbody>
                            </table>
                        </div>
                        <div id="pagination-container" class="p-3 border-top"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    
    <!-- HR Modal -->
    <div class="modal fade" id="hrModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content border-0 shadow">
                <div class="modal-header border-bottom-0 pb-0">
                    <h5 class="modal-title fw-bold" id="hrModalLabel">Expediente del Empleado</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="hrForm">
                        <input type="hidden" id="hrUserId">
                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label class="form-label text-secondary small fw-semibold">Nombre Completo</label>
                                <input type="text" class="form-control" id="hrFullName" readonly>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-secondary small fw-semibold">DPI / Documento</label>
                                <input type="text" class="form-control" id="hrDocumentId">
                            </div>
                        </div>
                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label class="form-label text-secondary small fw-semibold">Cargo (Puesto)</label>
                                <input type="text" class="form-control" id="hrJobTitle">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-secondary small fw-semibold">Salario Base Mensual</label>
                                <input type="number" step="0.01" class="form-control" id="hrSalary">
                            </div>
                        </div>
                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label class="form-label text-secondary small fw-semibold">Bono Adicional Fijo</label>
                                <input type="number" step="0.01" class="form-control" id="hrBaseBonus">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-secondary small fw-semibold">Fecha de Contratación</label>
                                <input type="date" class="form-control" id="hrHireDate">
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-top-0 pt-0">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" onclick="saveHrDetails()">Guardar Expediente</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Payroll Details Modal -->
    <div class="modal fade" id="payrollDetailsModal" tabindex="-1">
        <div class="modal-dialog modal-xl">
            <div class="modal-content border-0 shadow">
                <div class="modal-header border-bottom-0 pb-0">
                    <h5 class="modal-title fw-bold">Detalle de Planilla</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>Empleado</th>
                                    <th>Cargo</th>
                                    <th>Salario Base</th>
                                    <th>Bonos</th>
                                    <th>Deducciones</th>
                                    <th class="text-success fw-bold">Total a Pagar</th>
                                </tr>
                            </thead>
                            <tbody id="payroll-details-body">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
    <script src="../assets/js/theme.js?v=20260627004119"></script>
    <script src="../assets/js/toast.js?v=20260627004119"></script>
    <script src="../assets/js/apiClient.js?v=20260627004119"></script>
    <script src="../assets/js/signalr-client.js?v=20260627004119"></script>
    <script src="../assets/js/pagination.js?v=20260627004119"></script>
    <script src="hr.js"></script>
    <script src="../assets/js/ui-core.js?v=20260627004119"></script>
    <script src="../assets/js/menu.js?v=1783831414144"></script>
</body>
</html>
