<!DOCTYPE html>
<html lang="es" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motor de Temas - Sistema de Facturación Premium</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../assets/css/devextreme-theme.css">
    <style>
        .theme-card {
            transition: all 0.3s ease;
            cursor: pointer;
            border: 2px solid transparent;
        }
        .theme-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1) !important;
        }
        .theme-card.active {
            border-color: var(--bs-primary);
        }
        .theme-preview {
            height: 200px;
            object-fit: cover;
            border-bottom: 1px solid #eee;
        }
        .active-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="d-flex w-100 justify-content-between align-items-center pe-3">
                <a href="#" class="sidebar-brand mb-0">
                    <i class="bi bi-hexagon-fill"></i> <span id="brand-name">Nexus POS</span>
                </a>
                <button class="btn p-1 text-danger border-0" onclick="logout()" title="Cerrar Sesión">
                    <i class="bi bi-power fs-4"></i>
                </button>
            </div>
            </div>
            <nav class="sidebar-nav"></nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar">
                <div class="d-flex align-items-center gap-3">
                    <button class="btn btn-light d-lg-none" id="sidebarToggle"><i class="bi bi-list"></i></button>
                </div>
                <div class="d-flex align-items-center gap-4">
                    
                    <div class="dropdown me-3">
                          <button class="btn border-0 bg-transparent text-body p-2" type="button" data-bs-toggle="dropdown" onclick="loadNotifications()">
                              <div class="position-relative d-inline-block">
                                  <i class="bi bi-bell fs-5"></i>
                                  <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" id="notif-badge" style="display:none; font-size: 0.6em; transform: translate(-30%, -30%) !important;"></span>
                              </div>
                          </button>
                          <ul class="dropdown-menu dropdown-menu-end shadow-sm" style="width: 300px; max-height: 400px; overflow-y: auto;" id="notif-list">
                              <li><h6 class="dropdown-header">Notificaciones Pendientes</h6></li>
                          </ul>
                      </div>
                      <div class="form-check form-switch m-0">
                        <input class="form-check-input" type="checkbox" role="switch" id="theme-toggle">
                        <label class="form-check-label" for="theme-toggle"><i class="bi bi-moon-stars"></i></label>
                    </div>
                </div>
            </header>

            <div class="page-content">
                <h2 class="mb-4 fw-bold text-dark">Motor de Temas (Theme Engine)</h2>
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h4 class="fw-bold mb-0 text-secondary" style="font-size: 1rem;">Administra la apariencia total de tu tienda en línea</h4>
                    <button class="btn btn-outline-primary shadow-sm px-4" id="btnCustomize" onclick="openCustomizeModal()" disabled>
                        <i class="bi bi-sliders me-2"></i> PERSONALIZAR TEMA ACTIVO
                    </button>
                </div>

                <!-- Theme Grid -->
                <div class="row g-4" id="themes-grid">
                    <!-- Loaded via JS -->
                </div>

            </div>
        </main>
    </div>

    <!-- Modal Configuración del Tema -->
    <div class="modal fade" id="themeSettingsModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold"><i class="bi bi-palette text-primary me-2"></i>Personalizar Tema</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="themeSettingsForm">
                        <div class="row g-3 mb-4">
                            <h6 class="fw-bold text-secondary border-bottom pb-2">Colores y Tipografía</h6>
                            <div class="col-md-6">
                                <label class="form-label">Color Principal</label>
                                <input type="color" class="form-control form-control-color w-100" id="settingPrimaryColor">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Color Secundario</label>
                                <input type="color" class="form-control form-control-color w-100" id="settingSecondaryColor">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Fuente Principal (CSS FontFamily)</label>
                                <input type="text" class="form-control" id="settingFontFamily" placeholder="e.g. Inter, sans-serif">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Radio de Bordes (Border-Radius)</label>
                                <input type="text" class="form-control" id="settingBorderRadius" placeholder="e.g. 8px">
                            </div>
                        </div>

                        <div class="row g-3 mb-4">
                            <h6 class="fw-bold text-secondary border-bottom pb-2">Estilos y Layout</h6>
                            <div class="col-md-4">
                                <label class="form-label">Estilo de Botón</label>
                                <select class="form-select" id="settingButtonStyle">
                                    <option value="solid">Sólido</option>
                                    <option value="outline">Contorno</option>
                                    <option value="rounded">Redondeado Sólido</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Estilo de Tarjeta</label>
                                <select class="form-select" id="settingProductCardStyle">
                                    <option value="clean">Limpio (Sin bordes)</option>
                                    <option value="bordered">Con Bordes</option>
                                    <option value="shadow">Con Sombra</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Productos por Fila</label>
                                <input type="number" class="form-control" id="settingProductsPerRow" min="1" max="6">
                            </div>
                        </div>

                        <div class="row g-3">
                            <h6 class="fw-bold text-secondary border-bottom pb-2">Multimedia</h6>
                            <div class="col-md-6">
                                <label class="form-label">URL del Logo de la Tienda</label>
                                <input type="url" class="form-control" id="settingLogoUrl" placeholder="https://...">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">URL del Banner Principal (Hero)</label>
                                <input type="url" class="form-control" id="settingMainBannerUrl" placeholder="https://...">
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary px-4" onclick="saveThemeSettings()" id="btnSaveThemeSettings">Guardar Cambios</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
    <script src="../assets/js/theme.js"></script>
    <script src="../assets/js/toast.js"></script>
    <script src="../assets/js/apiClient.js"></script>
    <script src="../assets/js/signalr-client.js"></script>
    <script src="../assets/js/ui-core.js"></script>
    <script src="../assets/js/menu.js"></script>
    <script src="../assets/js/store-settings.js"></script>
</body>
</html>
