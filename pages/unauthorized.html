<!DOCTYPE html>
<html lang="es" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Denegado - Nexus POS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../assets/css/theme.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">
    <div class="text-center">
        <i class="bi bi-shield-lock-fill text-danger" style="font-size: 5rem;"></i>
        <h1 class="mt-4 fw-bold text-dark">Acceso Denegado</h1>
        <p class="text-secondary mt-3 fs-5">No tienes los permisos necesarios para ver esta página.</p>
        <p class="text-muted">Si crees que se trata de un error, por favor solicita acceso al administrador del sistema.</p>
        <button class="btn btn-primary mt-4 px-4 py-2 fw-semibold shadow-sm" onclick="goBackOrHome()">
            <i class="bi bi-arrow-left me-2"></i> Volver a un área segura
        </button>
    </div>

    <script>
        function goBackOrHome() {
            // Ir a POS si tiene permisos, de lo contrario salir
            let userPermissions = [];
            try {
                const stored = localStorage.getItem('userPermissions');
                if (stored) {
                    userPermissions = JSON.parse(stored);
                }
            } catch(e) {}
            
            if (userPermissions.includes('MANAGE_POS') || localStorage.getItem('userRole') === '1') {
                window.location.href = 'pos.html';
            } else if (userPermissions.includes('VIEW_REPORTS')) {
                window.location.href = 'reports.html';
            } else {
                // Ir a la primera ruta que tenga permiso
                window.location.href = 'login.html';
            }
        }
    </script>
</body>
</html>
