<!DOCTYPE html>
<html lang="es" >
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Nexus Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { background-color: #121416; padding: 2rem 0; }
        .login-card { max-width: 600px; width: 100%; margin: 0 auto; padding: 2rem; border-radius: 12px; }
    </style>

    <script>
        const savedTheme = localStorage.getItem('storeTheme') || 'light';
        document.documentElement.setAttribute('data-bs-theme', savedTheme);
    </script>
    </head>
<body>
    <div class="container">
        <div class="card login-card shadow">
            <h3 class="text-center fw-bold text-primary mb-4">Registro en Nexus Store</h3>
            <form id="registerForm" onsubmit="event.preventDefault(); register();">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Nombre Completo</label>
                        <input type="text" class="form-control " id="regName" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Usuario</label>
                        <input type="text" class="form-control " id="regUsername" required>
                    </div>
                </div>
                
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Correo Electrónico</label>
                        <input type="email" class="form-control " id="regEmail" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Teléfono</label>
                        <input type="tel" class="form-control " id="regPhone" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">DUI / Documento</label>
                    <input type="text" class="form-control " id="regDoc" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Dirección Principal</label>
                    <input type="text" class="form-control " id="regAddress" required>
                </div>

                <div class="mb-4">
                    <label class="form-label">Contraseña</label>
                    <input type="password" class="form-control " id="regPassword" required>
                </div>

                <button type="submit" class="btn btn-primary w-100 mb-3" id="registerBtn">Crear Cuenta</button>
                <div class="text-center">
                    <span class="text-muted">¿Ya tienes cuenta?</span> <a href="login.html" class="text-primary text-decoration-none">Inicia Sesión</a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        async function register() {
            const btn = document.getElementById('registerBtn');
            btn.disabled = true;
            btn.innerText = 'Registrando...';

            const data = {
                name: document.getElementById('regName').value,
                username: document.getElementById('regUsername').value,
                email: document.getElementById('regEmail').value,
                phone: document.getElementById('regPhone').value,
                documentNumber: document.getElementById('regDoc').value,
                address: document.getElementById('regAddress').value,
                password: document.getElementById('regPassword').value,
                latitude: 0,
                longitude: 0
            };

            try {
                const res = await fetch('https://billingsystem-net10pg.onrender.com/api/StoreAuth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (res.ok) {
                    const result = await res.json();
                    localStorage.setItem('storeToken', result.token);
                    localStorage.setItem('storeCustomer', JSON.stringify(result.customer));
                    
                    Swal.fire({
                        title: '¡Registro Exitoso!',
                        text: 'Bienvenido a Nexus Store.',
                        icon: 'success',
                        background: '#343a40',
                        color: '#fff',
                        timer: 1500,
                        showConfirmButton: false
                    }).then(() => {
                        window.location.href = 'index.html';
                    });
                } else {
                    const err = await res.json();
                    Swal.fire('Error', err.message || 'Error al registrar', 'error');
                    btn.disabled = false;
                    btn.innerText = 'Crear Cuenta';
                }
            } catch (e) {
                console.error(e);
                Swal.fire('Error', 'No se pudo conectar con el servidor', 'error');
                btn.disabled = false;
                btn.innerText = 'Crear Cuenta';
            }
        }
    </script>
</body>
</html>
