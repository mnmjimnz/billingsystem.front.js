<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito - Nexus Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css?v=1783556682594">

    <script>
        const savedTheme = localStorage.getItem('storeTheme') || 'light';
        document.documentElement.setAttribute('data-bs-theme', savedTheme);
    </script>
    </head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg sticky-top navbar-minimal">
        <div class="container">
            <a class="navbar-brand brand-title" href="index.html">
                <i class="bi bi-bag-check me-2"></i><span id="storeNameBrand">Tienda</span>
            </a>
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center">
                <li class="nav-item me-3" id="userMenu" style="display: none;">
                    <span class="me-2">Hola, <b id="customerName"></b></span>
                    <a href="#" class="text-danger text-decoration-none" onclick="logout()"><i class="bi bi-box-arrow-right"></i> Salir</a>
                </li>
                
                    <li class="nav-item me-3 d-flex align-items-center">
                        <button class="btn btn-link text-decoration-none p-0" onclick="toggleTheme()" title="Cambiar Tema">
                            <i class="bi bi-moon-stars-fill text-secondary fs-5" id="themeIcon"></i>
                        </button>
                    </li>

                    <li class="nav-item me-3" id="authMenu">
                    <a class="btn btn-outline-minimal" href="login.html">Iniciar Sesión</a>
                </li>
                <li class="nav-item">
                    <a class="btn btn-primary position-relative" href="cart.html">
                        <i class="bi bi-cart3"></i> Carrito
                        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" id="cartCount">0</span>
                    </a>
                </li>
            </ul>
        </div>
    </nav>

    <!-- Content -->
    <div class="container my-5">
        <h2 class="fw-bold mb-4">Tu Carrito de Compras</h2>
        <div class="row">
            <div class="col-lg-8 mb-4">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-borderless align-middle mb-0">
                                <thead>
                                    <tr>
                                        <th>Producto</th>
                                        <th>Precio</th>
                                        <th>Cantidad</th>
                                        <th>Subtotal</th>
                                        <th></th>
                                    </tr>
                                </thead>
                                <tbody id="cartItems">
                                    <!-- Loaded by JS -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="col-lg-4">
                <div class="card cart-card border-0">
                    <div class="card-body">
                        <h4 class="card-title mb-4">Resumen</h4>
                        <div class="d-flex justify-content-between mb-3">
                            <span>Total a Pagar:</span>
                            <h4 class="mb-0 fw-bold" id="cartTotal">$0.00</h4>
                        </div>
                        <button class="btn btn-minimal w-100 btn-lg" id="checkoutBtn" onclick="proceedToCheckout()" disabled>Continuar y Pagar</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Checkout Modal -->
    <div class="modal fade" id="checkoutModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title">Detalles de Envío</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="checkoutForm" onsubmit="event.preventDefault(); submitOrder();">
                        <div class="mb-3">
                            <label class="form-label">Nombre de quien recibe</label>
                            <input type="text" class="form-control" id="receiverName" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Dirección detallada (Casa, Apto, Referencias)</label>
                            <textarea class="form-control" id="deliveryAddress" rows="2" required></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Notas Adicionales</label>
                            <input type="text" class="form-control" id="deliveryNotes">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Selecciona tu ubicación exacta en el mapa</label>
                            <div id="map" style="height: 300px; width: 100%; border-radius: 8px;"></div>
                            <input type="hidden" id="latitude">
                            <input type="hidden" id="longitude">
                        </div>
                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-success btn-lg" id="confirmOrderBtn">Confirmar Pedido</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js?v=1783557143254"></script>
    <script>

        async function loadStoreName() {
            try {
                const res = await fetch('https://billingsystem-net10pg.onrender.com/api/Settings');
                if (res.ok) {
                    const settings = await res.json();
                    if (settings && settings.companyName) {
                        const el = document.getElementById('storeNameBrand');
                        if (el) el.innerText = settings.companyName;
                        document.title = settings.companyName + ' - Carrito';
                    }
                }
            } catch (e) {
                console.log("No se pudo cargar el nombre de la tienda");
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            initStore();
            loadStoreName();
            renderCart();
            
            // Prefill receiver name if logged in
            const customer = JSON.parse(localStorage.getItem('storeCustomer'));
            if (customer) {
                document.getElementById('receiverName').value = customer.name;
            }
        });

        let map, marker;
        window.mapInitialized = false;

        function initMap() {
            window.mapInitialized = true;
            // Default center: can be somewhere general
            const defaultLoc = [13.6929, -89.2182]; 
            
            map = L.map('map').setView(defaultLoc, 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);

            marker = L.marker(defaultLoc, {draggable: true}).addTo(map);
            
            document.getElementById('latitude').value = defaultLoc[0];
            document.getElementById('longitude').value = defaultLoc[1];

            marker.on('dragend', function (e) {
                const latlng = marker.getLatLng();
                document.getElementById('latitude').value = latlng.lat;
                document.getElementById('longitude').value = latlng.lng;
            });

            map.on('click', function (e) {
                marker.setLatLng(e.latlng);
                document.getElementById('latitude').value = e.latlng.lat;
                document.getElementById('longitude').value = e.latlng.lng;
            });

            // Try to get user's location
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    const latlng = [pos.coords.latitude, pos.coords.longitude];
                    map.setView(latlng, 15);
                    marker.setLatLng(latlng);
                    document.getElementById('latitude').value = latlng[0];
                    document.getElementById('longitude').value = latlng[1];
                });
            }
        }

        async function submitOrder() {
            const token = localStorage.getItem('storeToken');
            const data = {
                items: cart.map(i => ({ productId: i.id, quantity: i.qty, price: i.price })),
                deliveryAddress: document.getElementById('deliveryAddress').value,
                latitude: parseFloat(document.getElementById('latitude').value),
                longitude: parseFloat(document.getElementById('longitude').value),
                receiverName: document.getElementById('receiverName').value,
                notes: document.getElementById('deliveryNotes').value
            };

            document.getElementById('confirmOrderBtn').disabled = true;

            try {
                const response = await fetch(`${API_URL}/Store/checkout`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    const result = await response.json();
                    
                    // Clear cart
                    cart = [];
                    saveCart();

                    bootstrap.Modal.getInstance(document.getElementById('checkoutModal')).hide();
                    
                    Swal.fire({
                        title: '¡Pedido Confirmado!',
                        text: 'Tu pedido ha sido procesado exitosamente. Te contactaremos pronto.',
                        icon: 'success',
                        background: '#fff',
                        color: '#212529'
                    }).then(() => {
                        window.location.href = 'index.html';
                    });
                } else {
                    const err = await response.json();
                    Swal.fire('Error', err.message || 'Error al procesar el pedido', 'error');
                    document.getElementById('confirmOrderBtn').disabled = false;
                }
            } catch (error) {
                console.error(error);
                Swal.fire('Error', 'Error de red al procesar el pedido', 'error');
                document.getElementById('confirmOrderBtn').disabled = false;
            }
        }
    </script>
</body>
</html>
