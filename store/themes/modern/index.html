<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda - Moderno</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../style.css">

    <style>
        /* MODERN THEME (Apple / Allbirds Style) */
        body {
            background-color: #f5f5f7;
            color: #1d1d1f;
        }
        [data-bs-theme="dark"] body {
            background-color: #000000;
            color: #f5f5f7;
        }
        
        /* Navbar */
        .navbar-modern {
            background: rgba(255,255,255, 0.7);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        [data-bs-theme="dark"] .navbar-modern {
            background: rgba(29, 29, 31, 0.7);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .navbar-modern .nav-link, .navbar-modern .navbar-brand {
            font-size: 0.95rem;
            letter-spacing: -0.01em;
            color: #1d1d1f;
        }
        [data-bs-theme="dark"] .navbar-modern .nav-link, [data-bs-theme="dark"] .navbar-modern .navbar-brand {
            color: #f5f5f7;
        }

        /* Products Grid */
        .modern-product-card {
            background: #ffffff;
            border-radius: var(--bs-border-radius-lg, 18px);
            padding: 20px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            border: none;
            text-align: center;
        }
        [data-bs-theme="dark"] .modern-product-card {
            background: #1c1c1e;
        }
        .modern-product-card:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 20px rgba(0,0,0,0.08);
        }
        .modern-img-wrapper {
            height: 240px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
        }
        .modern-product-img {
            max-height: 100%;
            max-width: 100%;
            object-fit: contain;
        }
        .modern-product-title {
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: -0.01em;
            margin-bottom: 5px;
        }
        .modern-product-price {
            font-size: 1.05rem;
            color: var(--bs-secondary);
            margin-bottom: 15px;
        }
        .modern-btn-buy {
            background: var(--bs-primary);
            color: #fff;
            border-radius: 50px;
            padding: 8px 24px;
            font-size: 0.9rem;
            font-weight: 500;
            border: none;
            transition: opacity 0.2s;
        }
        .modern-btn-buy:hover {
            opacity: 0.85;
            color: #fff;
        }
        
        /* Sidebar */
        .modern-sidebar {
            background: transparent;
            border-right: 1px solid rgba(0,0,0,0.05);
            padding-right: 20px;
        }
        [data-bs-theme="dark"] .modern-sidebar {
            border-right: 1px solid rgba(255,255,255,0.1);
        }
        .modern-category-item {
            cursor: pointer;
            padding: 8px 0;
            font-size: 0.95rem;
            color: var(--bs-secondary);
            transition: color 0.2s;
        }
        .modern-category-item:hover, .modern-category-item.active {
            color: var(--bs-primary);
            font-weight: 600;
        }
    </style>
    <script>
        const savedTheme = localStorage.getItem('storeTheme') || 'light';
        document.documentElement.setAttribute('data-bs-theme', savedTheme);
    </script>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg sticky-top navbar-modern py-2">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html" id="storeNameBrand">Tienda Modern</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#storeNavbar">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="storeNavbar">
                <form class="d-flex mx-auto w-50" id="searchForm" onsubmit="event.preventDefault(); loadProducts(1);">
                    <input type="text" class="form-control rounded-pill bg-transparent border-secondary px-4" id="searchInput" placeholder="Buscar productos...">
                </form>

                <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center gap-3">
                    <li class="nav-item" id="userMenu" style="display: none;">
                        <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">
                            Hola, <b id="customerName"></b>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2 rounded-4">
                            <li><a class="dropdown-item py-2" href="#" onclick="showMyOrdersModal()">Mis Pedidos</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item text-danger py-2" href="#" onclick="logout()">Salir</a></li>
                        </ul>
                    </li>
                    <li class="nav-item">
                        <button class="btn btn-link text-decoration-none p-0" onclick="toggleTheme()" title="Cambiar Tema">
                            <i class="bi bi-moon-stars-fill fs-5" id="themeIcon"></i>
                        </button>
                    </li>
                    <li class="nav-item" id="authMenu">
                        <a class="btn btn-outline-secondary rounded-pill px-3 py-1" href="../../login.html">Iniciar Sesión</a>
                    </li>
                    <li class="nav-item">
                        <a href="../../cart.html" class="position-relative text-decoration-none" style="color: var(--bs-body-color)">
                            <i class="bi bi-bag fs-4"></i>
                            <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" id="cartCount" style="font-size: 0.6rem;">0</span>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Content -->
    <div class="container my-5">
        <div class="text-center mb-5">
            <h1 class="display-4 fw-bold" style="letter-spacing: -0.03em;">Descubre algo increíble.</h1>
            <p class="lead text-muted">Lo mejor en tecnología y estilo.</p>
        </div>

        <div class="row">
            <!-- Sidebar -->
            <div class="col-md-2 mb-4 modern-sidebar">
                <h6 class="text-uppercase fw-bold text-muted mb-3" style="font-size: 0.75rem;">Categorías</h6>
                <div id="categoryListContainer">
                    <!-- Loaded dynamically -->
                </div>
            </div>

            <!-- Product Grid -->
            <div class="col-md-10">
                <div class="row g-4" id="productList">
                    <!-- Products will be loaded here -->
                </div>
                
                <!-- Pagination -->
                <nav class="mt-5" aria-label="Product Pagination">
                    <ul class="pagination justify-content-center" id="pagination"></ul>
                </nav>
            </div>
        </div>
    </div>

    <!-- Modals (Product & Orders) will be injected or handled by app.js standard logic -->
    <!-- Product Detail Modal -->
    <div class="modal fade" id="productDetailModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg rounded-4 overflow-hidden">
                <div class="modal-body p-0">
                    <button type="button" class="btn-close position-absolute top-0 end-0 m-4" data-bs-dismiss="modal" style="z-index: 10;"></button>
                    <div class="row g-0">
                        <div class="col-md-6 bg-white d-flex align-items-center justify-content-center p-4">
                            <img src="" id="modalProductImg" class="img-fluid" style="max-height: 400px; object-fit: contain;">
                        </div>
                        <div class="col-md-6 p-5 d-flex flex-column justify-content-center">
                            <h2 id="modalProductTitle" class="fw-bold mb-2"></h2>
                            <h3 id="modalProductPrice" class="text-muted mb-4"></h3>
                            <p id="modalProductDesc" class="mb-5" style="line-height: 1.6;"></p>
                            <button class="modern-btn-buy w-100 py-3 fs-6" id="modalAddToCartBtn">Agregar al carrito</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- My Orders Modal -->
    <div class="modal fade" id="myOrdersModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg rounded-4">
                <div class="modal-header border-0 pb-0">
                    <h4 class="modal-title fw-bold">Mis Pedidos</h4>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4" id="myOrdersContent">
                    <div class="text-center text-muted py-4">Cargando pedidos...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>const API_BASE_URL = 'https://billingsystem-net10pg.onrender.com/api';</script>
    <script src="../../app.js"></script>
    
    <script>
        // Override render functions for this specific theme
        function renderCategories() {
            const list = document.getElementById('categoryListContainer');
            if (!list) return;
            let html = `<div class="modern-category-item ${currentCategory === 0 ? 'active' : ''}" onclick="filterByCategory(0)">Todas</div>`;
            categories.forEach(c => {
                html += `<div class="modern-category-item ${currentCategory === c.id ? 'active' : ''}" onclick="filterByCategory(${c.id})">${c.name}</div>`;
            });
            list.innerHTML = html;
        }

        function renderProducts(items) {
            const container = document.getElementById('productList');
            if (!container) return;
            if (items.length === 0) {
                container.innerHTML = `<div class="col-12 text-center my-5 text-muted">No se encontraron productos.</div>`;
                return;
            }
            let html = '';
            items.forEach(p => {
                html += `
                    <div class="col-sm-6 col-lg-4 mb-3">
                        <div class="modern-product-card h-100 d-flex flex-column" onclick="showProductModal(${p.id})">
                            <div class="modern-img-wrapper">
                                <img src="${p.imageUrl ? 'https://billingsystem-net10pg.onrender.com' + p.imageUrl : 'https://via.placeholder.com/300?text=Sin+Imagen'}" class="modern-product-img" alt="${p.name}">
                            </div>
                            <div class="modern-product-title text-truncate" title="${p.name}">${p.name}</div>
                            <div class="modern-product-price">$${p.price.toFixed(2)}</div>
                            <div class="mt-auto">
                                <button class="modern-btn-buy w-100" onclick="event.stopPropagation(); addToCart(${p.id}, '${p.name.replace(/'/g, "\\'")}', ${p.price}, '${p.imageUrl || ''}')">Comprar</button>
                            </div>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        document.addEventListener('DOMContentLoaded', () => {
            initStore();
            loadCategories();
            loadProducts();
        });
    </script>
    <a href="../../cart.html" class="floating-cart-btn text-decoration-none">
        <i class="bi bi-cart3 fs-5 me-1"></i> Carrito
        <span class="badge bg-danger" id="cartCount">0</span>
    </a>
</body>
</html>
