<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda - Marketplace</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="stylesheet" href="../../style.css">

    <style>
        /* MARKETPLACE THEME (Amazon Style) */
        body {
            background-color: #eaeded;
            color: #0f1111;
        }
        [data-bs-theme="dark"] body {
            background-color: #000000;
            color: #ffffff;
        }
        
        /* Navbar */
        .navbar-market {
            background-color: var(--bs-primary) !important;
            color: #ffffff !important;
        }
        .navbar-market .nav-link, .navbar-market .navbar-brand {
            color: #ffffff !important;
            font-weight: 700;
        }
        .search-market {
            display: flex;
            width: 100%;
        }
        .search-market input {
            border-radius: 4px 0 0 4px !important;
            border: none;
            padding: 10px 15px;
        }
        .search-market button {
            border-radius: 0 4px 4px 0 !important;
            background-color: var(--bs-secondary);
            border: none;
            color: #111;
        }
        .search-market button:hover {
            background-color: #f3a847;
        }
        
        /* Sidebar */
        .market-sidebar {
            background-color: #ffffff;
            border-right: 1px solid #ddd;
            padding: 15px 0;
            min-height: calc(100vh - 70px);
        }
        [data-bs-theme="dark"] .market-sidebar {
            background-color: #1a1a1a;
            border-right: 1px solid #333;
        }
        .market-category-title {
            font-weight: 700;
            padding: 0 20px;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }
        .market-category-item {
            cursor: pointer;
            padding: 8px 20px;
            color: #0f1111;
            font-size: 0.95rem;
        }
        [data-bs-theme="dark"] .market-category-item { color: #ccc; }
        .market-category-item:hover {
            background-color: #eaeded;
        }
        [data-bs-theme="dark"] .market-category-item:hover { background-color: #333; }
        .market-category-item.active {
            font-weight: 700;
            color: #c45500;
        }
        
        /* Products Grid */
        .market-product-card {
            background-color: #ffffff;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            height: 100%;
            transition: box-shadow 0.2s;
        }
        [data-bs-theme="dark"] .market-product-card {
            background-color: #1a1a1a;
            border: 1px solid #333;
        }
        .market-product-card:hover {
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .market-img-wrapper {
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            margin-bottom: 10px;
            cursor: pointer;
        }
        .market-product-img {
            max-height: 100%;
            max-width: 100%;
            object-fit: contain;
        }
        .market-product-title {
            font-size: 0.95rem;
            color: #007185;
            cursor: pointer;
            margin-bottom: 4px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .market-product-title:hover {
            color: #c45500;
            text-decoration: underline;
        }
        [data-bs-theme="dark"] .market-product-title { color: #5eb6c7; }
        [data-bs-theme="dark"] .market-product-title:hover { color: #e67a00; }
        
        .market-product-price {
            font-size: 1.4rem;
            font-weight: 700;
            color: #b12704;
            margin-bottom: auto;
        }
        [data-bs-theme="dark"] .market-product-price { color: #ff6b4a; }
        
        .market-btn-buy {
            background-color: #ffd814;
            border: 1px solid #fcd200;
            border-radius: 50px;
            color: #0f1111;
            padding: 6px 0;
            font-size: 0.9rem;
            font-weight: 400;
            width: 100%;
            margin-top: 10px;
        }
        .market-btn-buy:hover {
            background-color: #f7ca00;
            border-color: #f2c200;
        }
    </style>
    <script>
        const savedTheme = localStorage.getItem('storeTheme') || 'light';
        document.documentElement.setAttribute('data-bs-theme', savedTheme);
    </script>
</head>
<body class="m-0 p-0 overflow-x-hidden">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg sticky-top navbar-market py-1">
        <div class="container-fluid px-3">
            <a class="navbar-brand fs-4 me-4" href="index.html" id="storeNameBrand">Marketplace</a>
            <button class="navbar-toggler border-0 shadow-none text-white" type="button" data-bs-toggle="collapse" data-bs-target="#storeNavbar">
                <i class="bi bi-list fs-1"></i>
            </button>
            
            <div class="collapse navbar-collapse" id="storeNavbar">
                <form class="d-flex mx-auto flex-grow-1 px-4 my-2 my-lg-0" id="searchForm" onsubmit="event.preventDefault(); loadProducts(1);">
                    <div class="search-market">
                        <input type="text" class="form-control" id="searchInput" placeholder="Buscar productos...">
                        <button class="btn px-3" type="submit"><i class="bi bi-search"></i></button>
                    </div>
                </form>

                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item me-3" id="userMenu" style="display: none;">
                        <a class="nav-link dropdown-toggle py-0 lh-1" href="#" data-bs-toggle="dropdown">
                            <small class="d-block text-white-50" style="font-size: 0.75rem;">Hola, <span id="customerName"></span></small>
                            <span class="fw-bold">Cuenta y Pedidos</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end shadow border-1 mt-1 rounded-1">
                            <li><a class="dropdown-item py-2" href="#" onclick="showMyOrdersModal()">Tus Pedidos</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item text-danger py-2" href="#" onclick="logout()">Cerrar sesión</a></li>
                        </ul>
                    </li>
                    <li class="nav-item me-3" id="authMenu">
                        <a class="nav-link py-0 lh-1" href="../../login.html">
                            <small class="d-block text-white-50" style="font-size: 0.75rem;">Hola, Identifícate</small>
                            <span class="fw-bold">Cuenta y Listas</span>
                        </a>
                    </li>
                    <li class="nav-item me-3">
                        <button class="btn btn-link text-decoration-none p-0 text-white" onclick="toggleTheme()" title="Cambiar Tema">
                            <i class="bi bi-moon-stars fs-5" id="themeIcon"></i>
                        </button>
                    </li>
                    <li class="nav-item">
                        <a href="../../cart.html" class="nav-link fw-bold d-flex align-items-end text-white">
                            <div class="position-relative me-1">
                                <i class="bi bi-cart3 fs-3"></i>
                                <span class="position-absolute top-0 start-50 translate-middle text-warning fw-bold fs-6" id="cartCount" style="margin-top: 8px;">0</span>
                            </div>
                            <span class="mb-1">Carrito</span>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Sub-Navbar for Categories (Mobile) -->
    <div class="bg-dark text-white p-2 d-lg-none overflow-auto white-space-nowrap" id="mobileCategoryList">
        <!-- Loaded dynamically -->
    </div>

    <!-- Content -->
    <div class="container-fluid px-0">
        <div class="row g-0">
            <!-- Sidebar -->
            <div class="col-lg-2 d-none d-lg-block market-sidebar" style="background-color: var(--store-bg);">
                <div class="market-category-title">Departamentos</div>
                <div id="categoryListContainer">
                    <!-- Loaded dynamically -->
                </div>
            </div>

            <!-- Product Grid -->
            <div class="col-lg-10 p-3 p-lg-4" style="background-color: var(--store-bg);">
                <h4 class="mb-3 fw-bold" id="resultsTitle">Resultados</h4>
                <div class="row g-3" id="productList">
                    <!-- Products will be loaded here -->
                </div>
                
                <!-- Pagination -->
                <nav class="mt-4" aria-label="Product Pagination">
                    <ul class="pagination justify-content-center" id="pagination"></ul>
                </nav>
            </div>
        </div>
    </div>

    <!-- Modals (Product & Orders) will be injected or handled by app.js standard logic -->
    <!-- Product Detail Modal -->
    <div class="modal fade" id="productDetailModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content rounded-1">
                <div class="modal-header border-bottom-0 pb-0">
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4 pt-0">
                    <div class="row">
                        <div class="col-md-5 d-flex align-items-center justify-content-center mb-3 mb-md-0">
                            <img src="" id="modalProductImg" class="img-fluid" style="max-height: 350px; object-fit: contain;">
                        </div>
                        <div class="col-md-7">
                            <h4 id="modalProductTitle" class="fw-bold mb-2"></h4>
                            <div class="text-success small mb-2">Disponible.</div>
                            <hr>
                            <div class="mb-3">
                                <span class="text-muted small">Precio:</span> 
                                <span id="modalProductPrice" class="fs-4 fw-bold" style="color: #b12704;"></span>
                            </div>
                            <p id="modalProductDesc" class="small mb-4" style="line-height: 1.5;"></p>
                            
                            <div class="border rounded p-3 bg-light" style="background-color: var(--store-card) !important;">
                                <div class="fs-5 fw-bold mb-2" id="modalProductPriceBox"></div>
                                <div class="text-success fw-bold small mb-3">Envío GRATIS</div>
                                <button class="market-btn-buy" id="modalAddToCartBtn">Agregar al Carrito</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- My Orders Modal -->
    <div class="modal fade" id="myOrdersModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content rounded-1">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold">Mis Pedidos</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="myOrdersContent">
                    <div class="text-center text-muted py-4">Cargando pedidos...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>const API_BASE_URL = 'https://billingsystem-net10pg.onrender.com/api';</script>
    <script src="../../app.js"></script>
    
    <script>
        // Override render functions for this specific theme
        function renderCategories() {
            const list = document.getElementById('categoryListContainer');
            const mobileList = document.getElementById('mobileCategoryList');
            
            let html = `<div class="market-category-item ${currentCategory === 0 ? 'active' : ''}" onclick="filterByCategory(0)">Todos los departamentos</div>`;
            let mobileHtml = `<span class="me-3 cursor-pointer ${currentCategory === 0 ? 'fw-bold' : ''}" onclick="filterByCategory(0)" style="cursor:pointer">Todos</span>`;
            
            categories.forEach(c => {
                html += `<div class="market-category-item ${currentCategory === c.id ? 'active' : ''}" onclick="filterByCategory(${c.id})">${c.name}</div>`;
                mobileHtml += `<span class="me-3 cursor-pointer ${currentCategory === c.id ? 'fw-bold' : ''}" onclick="filterByCategory(${c.id})" style="cursor:pointer">${c.name}</span>`;
            });
            
            if (list) list.innerHTML = html;
            if (mobileList) mobileList.innerHTML = mobileHtml;
        }

        function renderProducts(items) {
            const container = document.getElementById('productList');
            if (!container) return;
            if (items.length === 0) {
                container.innerHTML = `<div class="col-12 text-center my-5 text-muted">No se encontraron productos.</div>`;
                return;
            }
            let html = '';
            items.forEach(p => {
                html += `
                    <div class="col-6 col-md-4 col-xl-3">
                        <div class="market-product-card">
                            <div class="market-img-wrapper" onclick="showProductModal(${p.id})">
                                <img src="${p.imageUrl ? (p.imageUrl.startsWith('http') ? p.imageUrl : 'https://billingsystem-net10pg.onrender.com' + p.imageUrl) : 'https://via.placeholder.com/300?text=Sin+Imagen'}" class="market-product-img" alt="${p.name}">
                            </div>
                            <div class="market-product-title" onclick="showProductModal(${p.id})" title="${p.name}">${p.name}</div>
                            <div class="text-warning small mb-1"><i class="bi bi-star-fill"></i><i class="bi bi-star-fill"></i><i class="bi bi-star-fill"></i><i class="bi bi-star-fill"></i><i class="bi bi-star-half"></i></div>
                            <div class="market-product-price">$${p.price.toFixed(2)}</div>
                            <button class="market-btn-buy" onclick="event.stopPropagation(); addToCart(${p.id}, '${p.name.replace(/'/g, "\\'")}', ${p.price}, '${p.imageUrl || ''}')">Agregar al carrito</button>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        document.addEventListener('DOMContentLoaded', () => {
            initStore();
            loadCategories();
            loadProducts();
        });
    </script>
    <a href="../../cart.html" class="floating-cart-btn text-decoration-none">
        <i class="bi bi-cart3 fs-5 me-1"></i> Carrito
        <span class="badge bg-danger" id="cartCount">0</span>
    </a>
</body>
</html>
