<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda - Fashion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="stylesheet" href="../../style.css">

    <style>
        /* FASHION THEME (Nike / KITH Style) */
        body {
            background-color: #ffffff;
            color: #111111;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            text-transform: uppercase;
        }
        [data-bs-theme="dark"] body {
            background-color: #111111;
            color: #ffffff;
        }
        
        /* Navbar */
        .navbar-fashion {
            background-color: transparent !important;
            border-bottom: 2px solid #111111;
            padding: 20px 0;
            transition: background-color 0.3s;
        }
        [data-bs-theme="dark"] .navbar-fashion { border-bottom: 2px solid #ffffff; }
        
        .navbar-fashion .navbar-brand {
            font-weight: 900;
            font-size: 2rem;
            letter-spacing: -2px;
            color: #111111 !important;
        }
        [data-bs-theme="dark"] .navbar-fashion .navbar-brand { color: #fff !important; }
        
        .navbar-fashion .nav-link {
            font-weight: 700;
            font-size: 0.9rem;
            color: #111111 !important;
            letter-spacing: 1px;
            margin: 0 10px;
        }
        [data-bs-theme="dark"] .navbar-fashion .nav-link { color: #fff !important; }

        /* Products Grid */
        .fashion-product-card {
            background: transparent;
            border: none;
            padding: 0;
            text-align: left;
            cursor: pointer;
            margin-bottom: 40px;
        }
        .fashion-img-wrapper {
            background-color: #f6f6f6;
            height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            overflow: hidden;
        }
        [data-bs-theme="dark"] .fashion-img-wrapper { background-color: #222222; }
        
        .fashion-product-img {
            max-height: 100%;
            max-width: 100%;
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .fashion-product-card:hover .fashion-product-img {
            transform: scale(1.05);
        }
        .fashion-product-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 5px;
            letter-spacing: -0.5px;
        }
        .fashion-product-category {
            font-size: 0.85rem;
            color: #757575;
            margin-bottom: 10px;
        }
        .fashion-product-price {
            font-size: 1.1rem;
            font-weight: 700;
        }
        
        /* Buttons */
        .btn-fashion {
            background-color: var(--bs-primary);
            color: #ffffff;
            border-radius: 30px;
            padding: 12px 30px;
            font-weight: 700;
            border: none;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        [data-bs-theme="dark"] .btn-fashion {
            color: #000;
        }
        .btn-fashion-outline {
            background-color: transparent;
            color: #111111;
            border: 1px solid #111111;
            border-radius: 30px;
            padding: 12px 30px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        [data-bs-theme="dark"] .btn-fashion-outline {
            color: #ffffff;
            border-color: #ffffff;
        }
        .btn-fashion-outline:hover {
            background-color: #111111;
            color: #ffffff;
        }
        [data-bs-theme="dark"] .btn-fashion-outline:hover {
            background-color: #ffffff;
            color: #111111;
        }
        
        /* Horizontal Category List */
        .fashion-category-list {
            display: flex;
            overflow-x: auto;
            gap: 20px;
            padding: 20px 0;
            border-bottom: 1px solid #eeeeee;
            margin-bottom: 40px;
            scrollbar-width: none; /* Firefox */
        }
        [data-bs-theme="dark"] .fashion-category-list { border-bottom: 1px solid #333; }
        .fashion-category-list::-webkit-scrollbar { display: none; }
        
        .fashion-category-item {
            font-size: 1.2rem;
            font-weight: 700;
            color: #a0a0a0;
            cursor: pointer;
            white-space: nowrap;
            transition: color 0.3s;
        }
        .fashion-category-item:hover, .fashion-category-item.active {
            color: #111111;
        }
        [data-bs-theme="dark"] .fashion-category-item:hover, [data-bs-theme="dark"] .fashion-category-item.active {
            color: #ffffff;
        }

        /* Search Fullscreen Overlay */
        #searchOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.95);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
        }
        [data-bs-theme="dark"] #searchOverlay { background: rgba(17,17,17,0.95); }
        .search-overlay-input {
            font-size: 3rem;
            font-weight: 900;
            border: none;
            border-bottom: 4px solid #111;
            background: transparent;
            color: #111;
            outline: none;
            text-transform: uppercase;
        }
        [data-bs-theme="dark"] .search-overlay-input { border-bottom-color: #fff; color: #fff; }
    </style>
    <script>
        const savedTheme = localStorage.getItem('storeTheme') || 'light';
        document.documentElement.setAttribute('data-bs-theme', savedTheme);
    </script>
</head>
<body>

    <!-- Search Overlay -->
    <div id="searchOverlay">
        <button class="btn-close position-absolute top-0 end-0 m-5 fs-2" onclick="document.getElementById('searchOverlay').style.display='none'"></button>
        <form class="w-75 text-center" onsubmit="event.preventDefault(); loadProducts(1); document.getElementById('searchOverlay').style.display='none';">
            <input type="text" class="search-overlay-input w-100 text-center" id="searchInput" placeholder="BUSCAR...">
        </form>
    </div>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg sticky-top navbar-fashion">
        <div class="container-fluid px-5">
            <a class="navbar-brand" href="index.html" id="storeNameBrand">FASHION</a>
            
            <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#storeNavbar">
                <i class="bi bi-list fs-1" style="color: var(--bs-body-color);"></i>
            </button>
            
            <div class="collapse navbar-collapse" id="storeNavbar">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center">
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="document.getElementById('searchOverlay').style.display='flex'">BUSCAR <i class="bi bi-search ms-1"></i></a>
                    </li>
                    <li class="nav-item" id="userMenu" style="display: none;">
                        <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">
                            <span id="customerName"></span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end shadow border-0 rounded-0 mt-3 p-3">
                            <li><a class="dropdown-item fw-bold" href="#" onclick="showMyOrdersModal()">MIS PEDIDOS</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item text-danger fw-bold" href="#" onclick="logout()">SALIR</a></li>
                        </ul>
                    </li>
                    <li class="nav-item" id="authMenu">
                        <a class="nav-link" href="../../login.html">INICIAR SESIÓN</a>
                    </li>
                    <li class="nav-item ms-3">
                        <a href="../../cart.html" class="nav-link position-relative">
                            <i class="bi bi-bag-fill fs-4"></i>
                            <span class="position-absolute top-50 start-100 translate-middle badge rounded-pill bg-danger" id="cartCount" style="font-size: 0.6rem; margin-top: -10px;">0</span>
                        </a>
                    </li>
                    <li class="nav-item ms-3">
                        <button class="btn btn-link text-decoration-none p-0" onclick="toggleTheme()" title="Cambiar Tema">
                            <i class="bi bi-moon-fill fs-5" id="themeIcon" style="color: var(--bs-body-color);"></i>
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Content -->
    <div class="container-fluid px-5 my-4">
        
        <!-- Horizontal Category List -->
        <div class="fashion-category-list" id="categoryListContainer">
            <!-- Loaded dynamically -->
        </div>

        <!-- Product Grid -->
        <div class="row g-4" id="productList">
            <!-- Products will be loaded here -->
        </div>
        
        <!-- Pagination -->
        <nav class="mt-5 mb-5" aria-label="Product Pagination">
            <ul class="pagination justify-content-center" id="pagination"></ul>
        </nav>
    </div>

    <!-- Product Detail Modal -->
    <div class="modal fade" id="productDetailModal" tabindex="-1">
        <div class="modal-dialog modal-fullscreen">
            <div class="modal-content rounded-0 border-0">
                <button type="button" class="btn-close position-absolute top-0 end-0 m-5 fs-3" data-bs-dismiss="modal" style="z-index: 10;"></button>
                <div class="modal-body p-0 d-flex flex-column flex-md-row">
                    <div class="w-100 w-md-50 d-flex align-items-center justify-content-center p-5" style="background-color: #f6f6f6; min-height: 50vh;">
                        <img src="" id="modalProductImg" class="img-fluid" style="max-height: 80vh; object-fit: contain;">
                    </div>
                    <div class="w-100 w-md-50 p-5 d-flex flex-column justify-content-center align-items-start">
                        <h1 id="modalProductTitle" class="fw-bold mb-3" style="font-size: 3rem; letter-spacing: -2px;"></h1>
                        <h2 id="modalProductPrice" class="mb-5"></h2>
                        <p id="modalProductDesc" class="mb-5 fs-5 text-lowercase" style="max-width: 600px; text-transform: none;"></p>
                        <div class="d-flex gap-3 w-100" style="max-width: 400px;">
                            <button class="btn-fashion flex-grow-1" id="modalAddToCartBtn">AGREGAR AL CARRITO</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- My Orders Modal -->
    <div class="modal fade" id="myOrdersModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content rounded-0 border-0 shadow-lg">
                <div class="modal-header border-bottom-0 pb-0 pt-4 px-4">
                    <h3 class="modal-title fw-bold">MIS PEDIDOS</h3>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4" id="myOrdersContent">
                    <div class="text-center text-muted py-4">CARGANDO PEDIDOS...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>const API_BASE_URL = 'https://billingsystem-net10pg.onrender.com/api';</script>
    <script src="../../app.js"></script>
    
    <script>
        // Override render functions for this specific theme
        function renderCategories() {
            const list = document.getElementById('categoryListContainer');
            if (!list) return;
            let html = `<div class="fashion-category-item ${currentCategory === 0 ? 'active' : ''}" onclick="filterByCategory(0)">NUEVOS LANZAMIENTOS</div>`;
            categories.forEach(c => {
                html += `<div class="fashion-category-item ${currentCategory === c.id ? 'active' : ''}" onclick="filterByCategory(${c.id})">${c.name}</div>`;
            });
            list.innerHTML = html;
        }

        function renderProducts(items) {
            const container = document.getElementById('productList');
            if (!container) return;
            if (items.length === 0) {
                container.innerHTML = `<div class="col-12 text-center my-5 fs-4">NO SE ENCONTRARON PRODUCTOS.</div>`;
                return;
            }
            let html = '';
            items.forEach(p => {
                html += `
                    <div class="col-12 col-md-6 col-xl-4">
                        <div class="fashion-product-card" onclick="showProductModal(${p.id})">
                            <div class="fashion-img-wrapper">
                                <img src="${p.imageUrl ? (p.imageUrl.startsWith('http') ? p.imageUrl : 'https://billingsystem-net10pg.onrender.com' + p.imageUrl) : 'https://via.placeholder.com/600?text=SIN+IMAGEN'}" class="fashion-product-img" alt="${p.name}">
                            </div>
                            <div class="d-flex justify-content-between align-items-start">
                                <div>
                                    <div class="fashion-product-title">${p.name}</div>
                                    <div class="fashion-product-category">Exclusivo</div>
                                </div>
                                <div class="fashion-product-price">$${p.price.toFixed(2)}</div>
                            </div>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        document.addEventListener('DOMContentLoaded', () => {
            initStore();
            loadCategories();
            loadProducts();
        });
    </script>
    <a href="../../cart.html" class="floating-cart-btn text-decoration-none">
        <i class="bi bi-cart3 fs-5 me-1"></i> Carrito
        <span class="badge bg-danger" id="cartCount">0</span>
    </a>
</body>
</html>
