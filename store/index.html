<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus POS - Tienda en Línea</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=1783556682587">

    <script>
        const savedTheme = localStorage.getItem('storeTheme') || 'light';
        document.documentElement.setAttribute('data-bs-theme', savedTheme);
    </script>
    </head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg sticky-top navbar-minimal">
        <div class="container">
            <a class="navbar-brand brand-title" href="index.html">
                <i class="bi bi-bag-check me-2"></i><span id="storeNameBrand">Tienda</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#storeNavbar">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="storeNavbar">
                <form class="d-flex mx-auto w-50" id="searchForm" onsubmit="event.preventDefault(); loadProducts(1);">
                    <div class="input-group search-minimal">
                        <input type="text" class="form-control px-4 py-2" id="searchInput" placeholder="Buscar productos...">
                        <button class="btn px-4" type="submit"><i class="bi bi-search"></i></button>
                    </div>
                </form>

                <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center">
                    <li class="nav-item dropdown me-3" id="userMenu" style="display: none;">
                        <a class="nav-link dropdown-toggle p-0" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            Hola, <b id="customerName"></b>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2">
                            <li><a class="dropdown-item py-2" href="#" onclick="showMyOrdersModal()"><i class="bi bi-box-seam me-2 text-primary"></i> Mis Pedidos</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item text-danger py-2" href="#" onclick="logout()"><i class="bi bi-box-arrow-right me-2"></i> Salir</a></li>
                        </ul>
                    </li>
                    
                    <li class="nav-item me-3 d-flex align-items-center">
                        <button class="btn btn-link text-decoration-none p-0" onclick="toggleTheme()" title="Cambiar Tema">
                            <i class="bi bi-moon-stars-fill text-secondary fs-5" id="themeIcon"></i>
                        </button>
                    </li>

                    <li class="nav-item me-3" id="authMenu">
                        <a class="btn btn-outline-minimal" href="login.html">Iniciar Sesión</a>
                    </li>
                    <li class="nav-item">
                        <a class="btn btn-minimal position-relative ms-3" href="cart.html">
                            <i class="bi bi-cart3"></i> Carrito
                            <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" id="cartCount">0</span>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Content -->
    <div class="container my-5">
        <div class="row">
            <!-- Sidebar / Categories -->
            <div class="col-md-3 mb-4">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-primary text-white fw-semibold">
                        Categorías
                    </div>
                    <ul class="list-group list-group-flush" id="categoryList">
                        <li class="list-group-item active-category" onclick="filterByCategory(0)">Todas</li>
                    </ul>
                </div>
            </div>

            <!-- Product Grid -->
            <div class="col-md-9">
                <div class="row g-4" id="productList">
                    <!-- Products will be loaded here -->
                </div>
                
                <!-- Pagination -->
                <nav class="mt-5" aria-label="Product Pagination">
                    <ul class="pagination justify-content-center" id="pagination">
                        <!-- Pagination loaded here -->
                    </ul>
                </nav>
            </div>
        </div>
    </div>

    
    <!-- Product Detail Modal -->
    <div class="modal fade" id="productDetailModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content" style="border-radius: 20px; overflow: hidden; border: none; box-shadow: var(--store-shadow-hover);">
                <div class="modal-body p-0">
                    <button type="button" class="btn-close position-absolute top-0 end-0 m-3" data-bs-dismiss="modal" style="z-index: 10; background-color: var(--store-card); border-radius: 50%; padding: 10px;"></button>
                    <div class="row g-0">
                        <div class="col-md-6 d-flex align-items-center justify-content-center" style="background-color: #fff; min-height: 300px;">
                            <img src="" id="modalProductImg" class="img-fluid" style="max-height: 400px; object-fit: contain; padding: 20px;" alt="">
                        </div>
                        <div class="col-md-6 p-4 p-md-5 d-flex flex-column">
                            <h3 id="modalProductTitle" class="fw-bold mb-3" style="color: var(--store-text);"></h3>
                            <h4 id="modalProductPrice" class="fw-bold mb-4" style="color: var(--store-text);"></h4>
                            <p id="modalProductDesc" class="text-muted mb-4 flex-grow-1" style="line-height: 1.6;"></p>
                            <button class="btn-minimal btn-lg w-100 mt-auto" id="modalAddToCartBtn">
                                <i class="bi bi-cart-plus me-2"></i>Agregar al Carrito
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        const API_BASE_URL = 'https://billingsystem-net10pg.onrender.com/api';
    </script>
    <script src="app.js?v=1783559113723"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initStore();
            loadCategories();
            loadProducts();
        });
    </script>

    <!-- My Orders Modal -->
    <div class="modal fade" id="myOrdersModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title"><i class="bi bi-box-seam"></i> Mis Pedidos</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="myOrdersContent">
                    <div class="text-center text-muted py-4">Cargando pedidos...</div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
