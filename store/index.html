<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cargando Tienda...</title>
    <style>
        body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f8f9fa; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        .loader { border: 4px solid #e9ecef; border-top: 4px solid #0d6efd; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading-container { text-align: center; }
        .loading-text { margin-top: 15px; color: #6c757d; }
    </style>
</head>
<body>
    <div class="loading-container">
        <div class="loader"></div>
        <div class="loading-text">Cargando experiencia...</div>
    </div>

    <script>
        // Router: Fetch settings and redirect to active theme
        async function routeToActiveTheme() {
            try {
                const settingsRes = await fetch('https://billingsystem-net10pg.onrender.com/api/Settings', { cache: 'no-store' });
                if (!settingsRes.ok) throw new Error('Settings API failed');
                const settings = await settingsRes.json();
                
                const activeThemeId = settings.activeThemeId;
                
                const themesRes = await fetch('https://billingsystem-net10pg.onrender.com/api/Themes', { cache: 'no-store' });
                if (!themesRes.ok) throw new Error('Themes API failed');
                const themes = await themesRes.json();
                
                const activeTheme = themes.find(t => t.id === activeThemeId) || themes[0];
                const code = activeTheme ? activeTheme.code : 'modern';
                
                window.location.replace(`./themes/${code}/index.html`);
            } catch (error) {
                console.error('Routing failed, falling back to modern theme', error);
                window.location.replace(`./themes/modern/index.html`);
            }
        }
        
        routeToActiveTheme();
    </script>
</body>
</html>
