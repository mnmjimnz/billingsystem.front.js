<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus POS - Tienda en Línea</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" href="index.html">
                <i class="bi bi-shop me-2"></i>Nexus Store
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#storeNavbar">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="storeNavbar">
                <form class="d-flex mx-auto w-50" id="searchForm" onsubmit="event.preventDefault(); loadProducts(1);">
                    <div class="input-group">
                        <input type="text" class="form-control" id="searchInput" placeholder="Buscar productos...">
                        <button class="btn btn-primary" type="submit"><i class="bi bi-search"></i></button>
                    </div>
                </form>

                <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center">
                    <li class="nav-item me-3" id="userMenu" style="display: none;">
                        <span class="text-light me-2">Hola, <b id="customerName"></b></span>
                        <a href="#" class="text-danger text-decoration-none" onclick="logout()"><i class="bi bi-box-arrow-right"></i> Salir</a>
                    </li>
                    <li class="nav-item me-3" id="authMenu">
                        <a class="btn btn-outline-light btn-sm" href="login.html">Iniciar Sesión</a>
                    </li>
                    <li class="nav-item">
                        <a class="btn btn-primary position-relative" href="cart.html">
                            <i class="bi bi-cart3"></i> Carrito
                            <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" id="cartCount">0</span>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Content -->
    <div class="container my-5">
        <div class="row">
            <!-- Sidebar / Categories -->
            <div class="col-md-3 mb-4">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-primary text-white fw-semibold">
                        Categorías
                    </div>
                    <ul class="list-group list-group-flush" id="categoryList">
                        <li class="list-group-item active-category" onclick="filterByCategory(0)">Todas</li>
                    </ul>
                </div>
            </div>

            <!-- Product Grid -->
            <div class="col-md-9">
                <div class="row g-4" id="productList">
                    <!-- Products will be loaded here -->
                </div>
                
                <!-- Pagination -->
                <nav class="mt-5" aria-label="Product Pagination">
                    <ul class="pagination justify-content-center" id="pagination">
                        <!-- Pagination loaded here -->
                    </ul>
                </nav>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initStore();
            loadCategories();
            loadProducts();
        });
    </script>
</body>
</html>
